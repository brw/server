server:
    module-config: "validator cachedb iterator"
    # serve-expired: yes
    # serve-expired-ttl: 86400
    # serve-expired-client-timeout: 0
    # cache-min-ttl: 300
    prefetch: yes
    msg-cache-size: 64m
    rrset-cache-size: 128m
    log-time-ascii: yes
    log-queries: yes
    log-replies: yes
    extended-statistics: yes

remote-control:
    control-enable: yes
    control-use-cert: no

cachedb:
    backend: "redis"
    redis-server-host: valkey-unbound
    redis-server-port: 6379
    redis-expire-records: no
